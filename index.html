<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chicken Marketplace</title>
    <style>
        /* This is the "CSS" - it makes the site look good */
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .header { background: #27ae60; color: white; padding: 10px; text-align: center; border-radius: 8px; }
        .market-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 15px; border-radius: 8px; width: 200px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .price { color: #e67e22; font-weight: bold; font-size: 1.2em; }
        button { background: #27ae60; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Kienyeji Market</h1>
    </div>
    <div style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; max-width: 400px;">
    <h3>Post a New Chicken</h3>
    <input type="text" id="breedInput" placeholder="Breed (e.g. Kenbro)" style="display:block; margin-bottom:10px; width:100%;">
    <input type="number" id="priceInput" placeholder="Price (KES)" style="display:block; margin-bottom:10px; width:100%;">
    <input type="text" id="locationInput" placeholder="Location" style="display:block; margin-bottom:10px; width:100%;">
    <input type="text" id="imageInput" placeholder="Image URL (optional)" style="display:block; margin-bottom:10px; width:100%;">
    <button id="addBtn">Post to Market</button>
</div>

    <div class="market-container">
        <div class="card">
            <h3>Improved Kienyeji</h3>
            <p>Age: 4 Months</p>
            <p>Location: Kitui</p>
            <p class="price">KES 800</p>
            <button>Contact Seller</button>
        </div>

        <div class="card">
            <h3>Kuroiler</h3>
            <p>Age: 5 Months</p>
            <p>Location: Eldoret</p>
            <p class="price">KES 1,200</p>
            <button>Contact Seller</button>
        </div>
    </div>
<script>
    // Persist chickenStock in localStorage so listings survive reloads
    const STORAGE_KEY = 'chickenStock';
    const DEFAULT_IMAGE = 'https://source.unsplash.com/featured/?chicken';

    // Try to load from localStorage, otherwise fall back to defaults
    let chickenStock = [];
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            chickenStock = JSON.parse(saved);
        } catch (e) {
            console.error('Failed to parse saved chickenStock, using defaults', e);
            chickenStock = [
                { breed: "Improved Kienyeji", price: 800, location: "Kitui", age: "4 Months", image: DEFAULT_IMAGE },
                { breed: "Kuroiler", price: 1200, location: "Eldoret", age: "5 Months", image: DEFAULT_IMAGE }
            ];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chickenStock));
        }
    } else {
        chickenStock = [
            { breed: "Improved Kienyeji", price: 800, location: "Kitui", age: "4 Months", image: DEFAULT_IMAGE },
            { breed: "Kuroiler", price: 1200, location: "Eldoret", age: "5 Months", image: DEFAULT_IMAGE }
        ];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chickenStock));
    }

    function saveStock() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chickenStock));
    }

    function renderMarket() {
        const container = document.querySelector('.market-container');
        container.innerHTML = ''; // Clear the screen first

        chickenStock.forEach((chicken, index) => {
            const price = Number(chicken.price);
            const imgSrc = chicken.image || DEFAULT_IMAGE;
            container.innerHTML += `
                <div class="card">
                    <img src="${imgSrc}" alt="${chicken.breed}" loading="lazy" onerror="this.onerror=null;this.src='${DEFAULT_IMAGE}';" style="width:100%; height:120px; object-fit:cover; border-radius:6px; margin-bottom:8px;">
                    <h3>${chicken.breed}</h3>
                    <p>Age: ${chicken.age}</p>
                    <p>Location: ${chicken.location}</p>
                    <p class="price">KES ${isNaN(price) ? chicken.price : price.toLocaleString()}</p>
                    <button onclick="contactSeller('${chicken.breed}')">Contact Seller</button>
                </div>
            `;
        });
    }

    // Add-to-market logic: store numbers correctly and persist
    document.getElementById('addBtn').addEventListener('click', () => {
        const breedVal = document.getElementById('breedInput').value.trim();
        const priceVal = document.getElementById('priceInput').value;
        const locationVal = document.getElementById('locationInput').value.trim();
        let imageVal = document.getElementById('imageInput').value.trim();

        // If the user typed a URL without protocol (e.g. "example.com/img.jpg"),
        // prepend https:// so the browser treats it as an absolute URL.
        if (imageVal && !/^https?:\/\//i.test(imageVal)) {
            imageVal = 'https://' + imageVal;
        }

        if (!breedVal || priceVal === "") {
            alert("Please fill in the breed and price!");
            return;
        }

        const newChicken = {
            breed: breedVal,
            price: Number(priceVal), // store as number
            location: locationVal || 'Unknown',
            age: "New Entry",
            image: imageVal || DEFAULT_IMAGE
        };

        chickenStock.push(newChicken);
        saveStock();
        renderMarket();

        // clear inputs
        document.getElementById('breedInput').value = '';
        document.getElementById('priceInput').value = '';
        document.getElementById('locationInput').value = '';
        document.getElementById('imageInput').value = '';
    });

    function contactSeller(breed) {
        alert("Interested in " + breed + "? Connecting you to the seller...");
    }

    // Initial render
    renderMarket();
</script>

</body>
</html>
