<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chicken Marketplace</title>
    <style>
        :root{
            --primary: #2d6a4f;
            --muted: #f4f6f5;
            --card-shadow: 0 8px 20px rgba(45,106,79,0.08);
        }
        *{box-sizing:border-box}
        body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:var(--muted); color:#08251f; margin:0; padding:16px}

        .header{background:var(--primary); color:#fff; padding:18px; text-align:center; border-radius:10px}
        .header h1{margin:0; font-size:1.25rem}

        /* Form container */
        .form-container{background:#fff; padding:16px; border-radius:10px; margin-bottom:16px; max-width:420px}
        .form-container input[type="text"], .form-container input[type="number"]{width:100%; padding:10px; border-radius:8px; border:1px solid #e6efe9; margin-bottom:10px}

        /* Primary action for posting */
        #addBtn{display:block; width:100%; padding:12px; border-radius:8px; border:none; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; box-shadow:0 6px 18px rgba(45,106,79,0.08); transition:transform .15s ease, box-shadow .15s ease}
        #addBtn:hover{transform:translateY(-3px); box-shadow:0 12px 30px rgba(45,106,79,0.12)}

        /* Market grid - mobile first */
        .market-container{display:grid; grid-template-columns:1fr; gap:1rem; margin-top:16px}

        /* Card layout */
        .card{background:#fff; border-radius:12px; padding:12px; box-shadow:var(--card-shadow); transition:transform .18s ease, box-shadow .18s ease; position:relative; overflow:hidden; display:flex; flex-direction:column; gap:8px}
    .card-img{width:100%; height:140px; object-fit:cover; border-radius:8px; display:block}
        .card:hover{transform:translateY(-6px); box-shadow:0 14px 40px rgba(45,106,79,0.12)}

        .card h3{margin:0; font-size:1rem; color:#08321f}
        .card p{margin:0; color:#375a4a; font-size:.95rem}
    .price{color:#e67e22; font-weight:800; font-size:1rem}
    .card-content{display:flex; flex-direction:column; gap:6px}
    .price-tag{color:#e67e22; font-weight:900; font-size:1.05rem}
    .card-actions{display:flex; gap:8px; margin-top:8px}
    .view-btn{flex:1; background:transparent; border:2px solid rgba(45,106,79,0.12); color:var(--primary); padding:8px 10px; border-radius:8px; cursor:pointer; font-weight:700}

        /* Location badge */
        .location-badge{position:absolute; top:12px; left:12px; background:rgba(45,106,79,0.95); color:#fff; padding:6px 8px; border-radius:999px; font-size:.78rem; font-weight:700; box-shadow:0 6px 18px rgba(45,106,79,0.08)}

        /* Professional contact button */
        .contact-btn{margin-top:auto; background:linear-gradient(180deg,var(--primary), #24543e); color:#fff; border:none; padding:10px 12px; border-radius:8px; font-weight:700; cursor:pointer; box-shadow:0 8px 22px rgba(45,106,79,0.12); transition:transform .12s ease, box-shadow .12s ease}
        .contact-btn:hover{transform:translateY(-4px); box-shadow:0 14px 34px rgba(45,106,79,0.16)}

        /* Responsive grid */
        @media(min-width:700px){ .market-container{grid-template-columns:repeat(2,1fr)} .card img{height:160px} }
        @media(min-width:1100px){ .market-container{grid-template-columns:repeat(3,1fr)} .card img{height:180px} }
    </style>
</head>
<body>

    <div class="header">
        <h1>Kienyeji Market</h1>
    </div>
    <div class="form-container">
    <h3>Post a New Chicken</h3>
    <input type="text" id="breedInput" placeholder="Breed (e.g. Kenbro)" style="display:block; margin-bottom:10px; width:100%;">
    <input type="number" id="priceInput" placeholder="Price (KES)" style="display:block; margin-bottom:10px; width:100%;">
    <input type="text" id="locationInput" placeholder="Location" style="display:block; margin-bottom:10px; width:100%;">
    <input type="text" id="imageInput" placeholder="Image URL (optional)" style="display:block; margin-bottom:10px; width:100%;">
    <button id="addBtn" class="contact-btn">Post to Market</button>
</div>

    <div class="market-container">
        <div class="card">
            <span class="location-badge">Kitui</span>
            <img class="card-img" src="https://source.unsplash.com/featured/?chicken" alt="Improved Kienyeji">
            <div class="card-content">
                <h3>Improved Kienyeji</h3>
                <p>Age: 4 Months</p>
                <p class="price-tag">KES 800</p>
            </div>
            <div class="card-actions">
                <button class="view-btn">View Details</button>
                <button class="contact-btn">Contact Seller</button>
            </div>
        </div>

        <div class="card">
            <span class="location-badge">Eldoret</span>
            <img class="card-img" src="https://source.unsplash.com/featured/?chicken" alt="Kuroiler">
            <div class="card-content">
                <h3>Kuroiler</h3>
                <p>Age: 5 Months</p>
                <p class="price-tag">KES 1,200</p>
            </div>
            <div class="card-actions">
                <button class="view-btn">View Details</button>
                <button class="contact-btn">Contact Seller</button>
            </div>
        </div>
    </div>
<script>
    // Persist chickenStock in localStorage so listings survive reloads
    const STORAGE_KEY = 'chickenStock';
    const DEFAULT_IMAGE = 'https://source.unsplash.com/featured/?chicken';

    // Try to load from localStorage, otherwise fall back to defaults
    let chickenStock = [];
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            chickenStock = JSON.parse(saved);
        } catch (e) {
            console.error('Failed to parse saved chickenStock, using defaults', e);
            chickenStock = [
                { breed: "Improved Kienyeji", price: 800, location: "Kitui", age: "4 Months", image: DEFAULT_IMAGE },
                { breed: "Kuroiler", price: 1200, location: "Eldoret", age: "5 Months", image: DEFAULT_IMAGE }
            ];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chickenStock));
        }
    } else {
        chickenStock = [
            { breed: "Improved Kienyeji", price: 800, location: "Kitui", age: "4 Months", image: DEFAULT_IMAGE },
            { breed: "Kuroiler", price: 1200, location: "Eldoret", age: "5 Months", image: DEFAULT_IMAGE }
        ];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chickenStock));
    }

    function saveStock() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chickenStock));
    }

    function renderMarket() {
        const container = document.querySelector('.market-container');
        container.innerHTML = ''; // Clear the screen first

        chickenStock.forEach((chicken, index) => {
            const price = Number(chicken.price);
            const imgSrc = chicken.image || DEFAULT_IMAGE;
            container.innerHTML += `
                <div class="card">
                    <span class="location-badge">${chicken.location}</span>
                    <img class="card-img" src="${imgSrc}" alt="${chicken.breed}" loading="lazy" onerror="this.onerror=null;this.src='${DEFAULT_IMAGE}';">
                    <div class="card-content">
                        <h3>${chicken.breed}</h3>
                        <p>Age: ${chicken.age}</p>
                        <p class="price-tag">KES ${isNaN(price) ? chicken.price : price.toLocaleString()}</p>
                    </div>
                    <div class="card-actions">
                        <button class="view-btn" onclick="alert('Viewing details for ${chicken.breed}')">View Details</button>
                        <button class="contact-btn" onclick="contactSeller('${chicken.breed}')">Contact Seller</button>
                    </div>
                </div>
            `;
        });
    }

    // Add-to-market logic: store numbers correctly and persist
    document.getElementById('addBtn').addEventListener('click', () => {
        const breedVal = document.getElementById('breedInput').value.trim();
        const priceVal = document.getElementById('priceInput').value;
        const locationVal = document.getElementById('locationInput').value.trim();
        let imageVal = document.getElementById('imageInput').value.trim();

        // If the user typed a URL without protocol (e.g. "example.com/img.jpg"),
        // prepend https:// so the browser treats it as an absolute URL.
        if (imageVal && !/^https?:\/\//i.test(imageVal)) {
            imageVal = 'https://' + imageVal;
        }

        if (!breedVal || priceVal === "") {
            alert("Please fill in the breed and price!");
            return;
        }

        const newChicken = {
            breed: breedVal,
            price: Number(priceVal), // store as number
            location: locationVal || 'Unknown',
            age: "New Entry",
            image: imageVal || DEFAULT_IMAGE
        };

        chickenStock.push(newChicken);
        saveStock();
        renderMarket();

        // clear inputs
        document.getElementById('breedInput').value = '';
        document.getElementById('priceInput').value = '';
        document.getElementById('locationInput').value = '';
        document.getElementById('imageInput').value = '';
    });

    function contactSeller(breed) {
        alert("Interested in " + breed + "? Connecting you to the seller...");
    }

    // Initial render
    renderMarket();
</script>

</body>
</html>
