<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chicken Marketplace</title>
    <style>
        :root{
            --primary: #2d6a4f;
            --muted: #f4f6f5;
            --card-shadow: 0 8px 20px rgba(45,106,79,0.08);
        }
        *{box-sizing:border-box}
        body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:var(--muted); color:#08251f; margin:0; padding:16px}

        .header{background:var(--primary); color:#fff; padding:18px; text-align:center; border-radius:10px}
        .header h1{margin:0; font-size:1.25rem}

        /* Form container */
        .form-container{background:#fff; padding:16px; border-radius:10px; margin-bottom:16px; max-width:420px}
        .form-container input[type="text"], .form-container input[type="number"]{width:100%; padding:10px; border-radius:8px; border:1px solid #e6efe9; margin-bottom:10px}

        /* Primary action for posting */
        #addBtn{display:block; width:100%; padding:12px; border-radius:8px; border:none; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; box-shadow:0 6px 18px rgba(45,106,79,0.08); transition:transform .15s ease, box-shadow .15s ease}
        #addBtn:hover{transform:translateY(-3px); box-shadow:0 12px 30px rgba(45,106,79,0.12)}

        /* Market grid - mobile first */
        .market-container{display:grid; grid-template-columns:1fr; gap:1rem; margin-top:16px}

        /* Card layout */
        .card{background:#fff; border-radius:12px; padding:12px; box-shadow:var(--card-shadow); transition:transform .18s ease, box-shadow .18s ease; position:relative; overflow:hidden; display:flex; flex-direction:column; gap:8px}
    .card-img{width:100%; height:140px; object-fit:cover; border-radius:8px; display:block}
        .card:hover{transform:translateY(-6px); box-shadow:0 14px 40px rgba(45,106,79,0.12)}

        .card h3{margin:0; font-size:1rem; color:#08321f}
        .card p{margin:0; color:#375a4a; font-size:.95rem}
    .price{color:#e67e22; font-weight:800; font-size:1rem}
    .card-content{display:flex; flex-direction:column; gap:6px}
    .price-tag{color:#e67e22; font-weight:900; font-size:1.05rem}
    .card-actions{display:flex; gap:8px; margin-top:8px}
    .view-btn{flex:1; background:transparent; border:2px solid rgba(45,106,79,0.12); color:var(--primary); padding:8px 10px; border-radius:8px; cursor:pointer; font-weight:700}

        /* Location badge */
        .location-badge{position:absolute; top:12px; left:12px; background:rgba(45,106,79,0.95); color:#fff; padding:6px 8px; border-radius:999px; font-size:.78rem; font-weight:700; box-shadow:0 6px 18px rgba(45,106,79,0.08)}

        /* Professional contact button */
        .contact-btn{margin-top:auto; background:linear-gradient(180deg,var(--primary), #24543e); color:#fff; border:none; padding:10px 12px; border-radius:8px; font-weight:700; cursor:pointer; box-shadow:0 8px 22px rgba(45,106,79,0.12); transition:transform .12s ease, box-shadow .12s ease}
        .contact-btn:hover{transform:translateY(-4px); box-shadow:0 14px 34px rgba(45,106,79,0.16)}

        /* Responsive grid */
        @media(min-width:700px){ .market-container{grid-template-columns:repeat(2,1fr)} .card img{height:160px} }
        @media(min-width:1100px){ .market-container{grid-template-columns:repeat(3,1fr)} .card img{height:180px} }
    </style>
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">
            <img src="" alt="" aria-hidden="true" style="width:36px;height:36px;border-radius:6px;background:#fff;display:inline-block"> 
            <h1>Kienyeji Marketplace</h1>
        </div>
        <div class="search-box">
            <input id="searchInput" placeholder="Search breed, location..." />
        </div>
        <div class="nav-actions">
            <div id="accountArea">
                <button id="loginBtn">Login</button>
            </div>
            <button id="sellBtn" class="btn-sell">Sell</button>
        </div>
    </header>

    <!-- Auth modal (hidden by default) -->
    <div id="authModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); align-items:center; justify-content:center; z-index:60">
        <div style="background:#fff; padding:18px; border-radius:8px; width:320px; max-width:90%">
            <h3 id="authTitle">Sign In</h3>
            <input id="authEmail" type="email" placeholder="Email" style="width:100%; padding:8px; margin-bottom:8px">
            <input id="authPassword" type="password" placeholder="Password" style="width:100%; padding:8px; margin-bottom:8px">
            <div style="display:flex; gap:8px">
                <button id="authSignIn" style="flex:1">Sign In</button>
                <button id="authSignUp" style="flex:1">Sign Up</button>
            </div>
            <div style="text-align:right; margin-top:8px"><button id="authClose">Close</button></div>
        </div>
    </div>
    <div class="form-container">
    <h3>Post a New Chicken</h3>
    <input type="text" id="breedInput" placeholder="Breed (e.g. Kenbro)" style="display:block; margin-bottom:10px; width:100%;">
    <input type="number" id="priceInput" placeholder="Price (KES)" style="display:block; margin-bottom:10px; width:100%;">
    <input type="text" id="locationInput" placeholder="Location" style="display:block; margin-bottom:10px; width:100%;">
    <input type="text" id="imageInput" placeholder="Image URL (optional)" style="display:block; margin-bottom:10px; width:100%;">
    <!-- Optional file upload: will be uploaded to Vercel Blob via /api/upload -->
    <input type="file" id="imageFileInput" accept="image/*" style="display:block; margin-bottom:10px; width:100%;">
    <button id="addBtn" class="contact-btn">Post to Market</button>
</div>

    <div class="market-container">
        <div class="card">
            <span class="location-badge">Kitui</span>
            <img class="card-img" src="https://source.unsplash.com/featured/?chicken" alt="Improved Kienyeji">
            <div class="card-content">
                <h3>Improved Kienyeji</h3>
                <p>Age: 4 Months</p>
                <p class="price-tag">KES 800</p>
            </div>
            <div class="card-actions">
                <button class="view-btn">View Details</button>
                <button class="contact-btn">Contact Seller</button>
            </div>
        </div>

        <div class="card">
            <span class="location-badge">Eldoret</span>
            <img class="card-img" src="https://source.unsplash.com/featured/?chicken" alt="Kuroiler">
            <div class="card-content">
                <h3>Kuroiler</h3>
                <p>Age: 5 Months</p>
                <p class="price-tag">KES 1,200</p>
            </div>
            <div class="card-actions">
                <button class="view-btn">View Details</button>
                <button class="contact-btn">Contact Seller</button>
            </div>
        </div>
    </div>
<!-- Third-party libraries: Supabase (Auth + DB) and jsPDF for receipts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    // Supabase config - replace with your project values
    const SUPABASE_URL = 'https://YOUR_SUPABASE_URL.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    let supabase = null;
    try {
        if (SUPABASE_URL && SUPABASE_ANON_KEY) supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
        console.warn('Supabase not configured or failed to load', e);
    }

    // Simple auth modal wiring
    const authModal = document.getElementById('authModal');
    const loginBtn = document.getElementById('loginBtn');
    const authClose = document.getElementById('authClose');
    const authSignIn = document.getElementById('authSignIn');
    const authSignUp = document.getElementById('authSignUp');

    function openAuth() { authModal.style.display = 'flex'; }
    function closeAuth() { authModal.style.display = 'none'; }
    loginBtn.addEventListener('click', openAuth);
    authClose.addEventListener('click', closeAuth);

    async function signUp() {
        if (!supabase) return alert('Supabase not configured');
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) alert('Sign up error: ' + error.message); else { alert('Check your email for confirmation'); closeAuth(); }
    }
    async function signIn() {
        if (!supabase) return alert('Supabase not configured');
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert('Sign in error: ' + error.message); else { alert('Signed in'); closeAuth(); updateAuthUI(); }
    }
    authSignUp.addEventListener('click', signUp);
    authSignIn.addEventListener('click', signIn);

    async function signOut() {
        if (!supabase) return;
        await supabase.auth.signOut();
        updateAuthUI();
    }

    // Update header account area based on auth state
    function updateAuthUI() {
        const accountArea = document.getElementById('accountArea');
        if (!supabase) return;
        const user = supabase.auth.getUser ? supabase.auth.getUser() : null;
        // supabase.auth.getUser() returns a Promise in new lib; check token via session
        supabase.auth.getSession().then(({ data }) => {
            const session = data.session;
            if (session && session.user) {
                accountArea.innerHTML = `<span style="margin-right:8px">${session.user.email}</span><button id=signOutBtn>Logout</button>`;
                document.getElementById('signOutBtn').addEventListener('click', signOut);
                document.querySelector('.form-container').style.display = 'block';
            } else {
                accountArea.innerHTML = `<button id="loginBtn">Login</button>`;
                document.getElementById('loginBtn').addEventListener('click', openAuth);
                // hide form for non-logged users
                document.querySelector('.form-container').style.display = 'none';
            }
        });
    }

    // Show sell button behavior
    document.getElementById('sellBtn').addEventListener('click', () => { document.querySelector('.form-container').scrollIntoView({ behavior: 'smooth' }); openAuth(); });

    // Initialize UI state
    updateAuthUI();

    // If Supabase is configured, fetch chickens from DB; otherwise use localStorage
    async function fetchChickens() {
        if (supabase) {
            try {
                const { data, error } = await supabase.from('chickens').select('*').order('created_at', { ascending: false });
                if (error) {
                    console.warn('Supabase fetch error, falling back to localStorage', error.message);
                } else if (data) {
                    chickenStock = data.map(d => ({ breed: d.breed, price: d.price, location: d.location, age: d.age || 'N/A', image: d.image || DEFAULT_IMAGE, id: d.id, user_id: d.user_id }));
                    renderMarket();
                    return;
                }
            } catch (e) {
                console.error('Error fetching from Supabase', e);
            }
        }
        // fallback to local storage render
        renderMarket();
    }

    fetchChickens();

    // Persist chickenStock in localStorage so listings survive reloads
    const STORAGE_KEY = 'chickenStock';
    const DEFAULT_IMAGE = 'https://source.unsplash.com/featured/?chicken';

    // Try to load from localStorage, otherwise fall back to defaults
    let chickenStock = [];
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            chickenStock = JSON.parse(saved);
        } catch (e) {
            console.error('Failed to parse saved chickenStock, using defaults', e);
            chickenStock = [
                { breed: "Improved Kienyeji", price: 800, location: "Kitui", age: "4 Months", image: DEFAULT_IMAGE },
                { breed: "Kuroiler", price: 1200, location: "Eldoret", age: "5 Months", image: DEFAULT_IMAGE }
            ];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chickenStock));
        }
    } else {
        chickenStock = [
            { breed: "Improved Kienyeji", price: 800, location: "Kitui", age: "4 Months", image: DEFAULT_IMAGE },
            { breed: "Kuroiler", price: 1200, location: "Eldoret", age: "5 Months", image: DEFAULT_IMAGE }
        ];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chickenStock));
    }

    function saveStock() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chickenStock));
    }

    // Upload a File object to the server which creates a Vercel Blob upload URL.
    // Returns the final blob URL on success.
    async function uploadFile(file) {
        // Basic validation
        const maxSize = 5 * 1024 * 1024; // 5MB
        if (!file.type.startsWith('image/')) throw new Error('Only image files are allowed');
        if (file.size > maxSize) throw new Error('File is too large (max 5MB)');

        // Request an upload URL from our serverless endpoint
        const createResp = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: file.name, size: file.size, contentType: file.type })
        });

        if (!createResp.ok) {
            const err = await createResp.json().catch(() => ({}));
            const detail = err.detail ? (err.detail.message || JSON.stringify(err.detail)) : '';
            const msg = (err.error || 'Failed to create upload URL') + (detail ? ' - ' + detail : '');
            throw new Error(msg);
        }

        const createJson = await createResp.json();
        const uploadURL = createJson.uploadURL || createJson.upload_url || createJson.uploadUrl;
        const publicUrl = createJson.url || createJson.publicUrl || createJson.fileUrl || createJson.file_url;

        if (!uploadURL) throw new Error('No upload URL returned from server');

        // PUT the file bytes directly to the uploadURL
        const putResp = await fetch(uploadURL, { method: 'PUT', headers: { 'Content-Type': file.type }, body: file });
        if (!putResp.ok) {
            throw new Error('Upload failed with status ' + putResp.status);
        }

        // If the create endpoint returned a public URL, return it; otherwise return undefined
        return publicUrl || createJson.id || null;
    }

    function renderMarket() {
        const container = document.querySelector('.market-container');
        container.innerHTML = ''; // Clear the screen first

        chickenStock.forEach((chicken, index) => {
            const price = Number(chicken.price);
            const imgSrc = chicken.image || DEFAULT_IMAGE;
            container.innerHTML += `
                <div class="card">
                    <span class="location-badge">${chicken.location}</span>
                    <img class="card-img" src="${imgSrc}" alt="${chicken.breed}" loading="lazy" onerror="this.onerror=null;this.src='${DEFAULT_IMAGE}';">
                    <div class="card-content">
                        <h3>${chicken.breed}</h3>
                        <p>Age: ${chicken.age}</p>
                        <p class="price-tag">KES ${isNaN(price) ? chicken.price : price.toLocaleString()}</p>
                    </div>
                    <div class="card-actions">
                        <button class="view-btn" onclick="buyNow(${index})">Buy Now</button>
                        <button class="contact-btn" onclick="contactSeller('${chicken.breed}')">Contact Seller</button>
                    </div>
                </div>
            `;
        });
    }

    // Add-to-market logic: store numbers correctly and persist
    document.getElementById('addBtn').addEventListener('click', async () => {
        const addBtn = document.getElementById('addBtn');
        addBtn.disabled = true;
        addBtn.textContent = 'Posting...';
        try {
            const breedVal = document.getElementById('breedInput').value.trim();
            const priceVal = document.getElementById('priceInput').value;
            const locationVal = document.getElementById('locationInput').value.trim();
            let imageVal = document.getElementById('imageInput').value.trim();
            const fileInput = document.getElementById('imageFileInput');
            const file = fileInput && fileInput.files && fileInput.files[0];

            // If the user typed a URL without protocol (e.g. "example.com/img.jpg"),
            // prepend https:// so the browser treats it as an absolute URL.
            if (imageVal && !/^https?:\/\//i.test(imageVal)) {
                imageVal = 'https://' + imageVal;
            }

            if (!breedVal || priceVal === "") {
                alert("Please fill in the breed and price!");
                return;
            }

            // If a file is provided, upload it to Vercel Blob via our serverless API
            let finalImage = imageVal || '';
            if (file) {
                try {
                    const uploaded = await uploadFile(file);
                    // uploadFile returns either a public url or an id; prefer public url
                    if (uploaded && uploaded.startsWith && uploaded.startsWith('http')) {
                        finalImage = uploaded;
                    } else if (typeof uploaded === 'string' && uploaded.length > 0) {
                        // If server returned only an id, construct a fallback URL placeholder
                        finalImage = uploaded; // store id so you can resolve server-side later
                    }
                } catch (err) {
                    console.error('Upload failed', err);
                    alert('Image upload failed: ' + err.message);
                    return;
                }
            }

            const newChicken = {
                breed: breedVal,
                price: Number(priceVal), // store as number
                location: locationVal || 'Unknown',
                age: "New Entry",
                image: finalImage || DEFAULT_IMAGE
            };

            chickenStock.push(newChicken);
            saveStock();
            renderMarket();

            // clear inputs
            document.getElementById('breedInput').value = '';
            document.getElementById('priceInput').value = '';
            document.getElementById('locationInput').value = '';
            document.getElementById('imageInput').value = '';
            if (fileInput) fileInput.value = '';

        } finally {
            addBtn.disabled = false;
            addBtn.textContent = 'Post to Market';
        }
    });

    function contactSeller(breed) {
        alert("Interested in " + breed + "? Connecting you to the seller...");
    }

    // Simulate M-Pesa STK Push flow by calling serverless /api/mpesa
    async function buyNow(index) {
        const chicken = chickenStock[index];
        if (!chicken) return alert('Item not found');
        let phone = prompt('Enter your phone number (e.g. 2547xxxxxxxx):');
        if (!phone) return;
        const amount = chicken.price || 0;
        try {
            const resp = await fetch('/api/mpesa', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ phone, amount, item: chicken.breed }) });
            const json = await resp.json();
            if (!resp.ok) {
                alert('Payment failed: ' + (json && (json.error || JSON.stringify(json))));
                return;
            }
            // Payment success - generate receipt
            const order = { id: json.transactionId || json.id || ('ORD' + Date.now()), breed: chicken.breed, price: amount, phone };
            generateReceipt(order);
            alert('Payment successful — receipt downloaded');
        } catch (e) {
            console.error('Payment error', e);
            alert('Payment error: ' + e.message);
        }
    }

    function generateReceipt(order) {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            // Simple layout
            doc.setFontSize(18);
            doc.setTextColor(45,106,79);
            doc.text('Kienyeji Marketplace', 20, 20);
            doc.setFontSize(12);
            doc.setTextColor(0,0,0);
            doc.text('Order ID: ' + order.id, 20, 36);
            doc.text('Breed: ' + order.breed, 20, 46);
            doc.text('Price: KES ' + order.price, 20, 56);
            doc.text('Phone: ' + order.phone, 20, 66);
            // Paid watermark
            doc.setTextColor(200,200,200);
            doc.setFontSize(48);
            doc.text('PAID', 40, 140, { angle: 45 });
            doc.save('receipt_' + order.id + '.pdf');
        } catch (e) {
            console.error('Receipt generation failed', e);
        }
    }

    // Initial render
    renderMarket();
</script>

</body>
</html>
